{{ $page := .Page }}
{{ $structure := .Structure }}

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ $page.Title }}</h1>
    {{ partial "post_meta.html" $page }}
  </header>

  {{ if $structure }}
    {{ partial "composer/render-structure.html" (dict
      "Page" $page
      "Structure" $structure
    ) }}
  {{ else }}
    <div class="post-content">
      {{ $page.Content }}
    </div>
  {{ end }}
</article>
