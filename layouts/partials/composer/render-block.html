{{/*
  render-block.html
  Renders a single content block based on ref + anchors passed in dict.
*/}}

{{ $ref := .ref }}
{{ $anchors := .anchors }}
{{ $anchor := index $anchors $ref }}

<section id="{{ $ref }}" class="content-block">
  <article class="prose">
    <h2>{{ $ref }}</h2>
    {{ if $anchor }}
      {{ $anchor | markdownify }}
    {{ else }}
      <p>⚠️ No anchor found for <code>{{ $ref }}</code>.</p>
    {{ end }}
  </article>
</section>
